<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AayoApp | Exclusive Webinar Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- EmailJS SDK (Keep this if you choose to use EmailJS) -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Uncomment and add your key if using EmailJS
            // emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); 
        })();
    </script>

    <style>
        :root {
            --primary: #FF7A6E; 
            --primary-glow: rgba(255, 122, 110, 0.6);
            --dark: #0a0a0c;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 122, 110, 0.2);
            --text-light: #f4f4f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--dark);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 3D Particle Canvas --- */
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 1s ease, visibility 1s ease;
        }
        .splash-logo {
            font-size: 4rem; font-weight: 800; color: var(--primary);
            letter-spacing: 2px; animation: pulseGlow 2s infinite alternate;
        }
        .splash-tagline { font-size: 1.2rem; margin-top: 10px; color: #aaa; letter-spacing: 1px; text-align: center; padding: 0 20px; }
        
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px var(--primary-glow); transform: scale(1); }
            100% { text-shadow: 0 0 30px var(--primary), 0 0 50px var(--primary); transform: scale(1.05); }
        }

        /* --- Glassmorphism Form Container --- */
        .form-wrapper {
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px;
            width: 100%; max-width: 550px; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255, 122, 110, 0.05);
            opacity: 0; transform: translateY(50px) scale(0.95);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s; margin: 40px 20px;
        }
        .form-wrapper.visible { opacity: 1; transform: translateY(0) scale(1); }

        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header h2 {
            font-size: 2rem; font-weight: 800; background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px;
        }
        .form-header p { font-size: 0.95rem; color: #ccc; }

        /* --- Text Inputs --- */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group input {
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 1rem;
            outline: none; transition: all 0.3s ease;
        }
        .input-group input:focus {
            border-color: var(--primary); box-shadow: 0 0 20px rgba(255, 122, 110, 0.2);
            background: rgba(255, 255, 255, 0.08); transform: translateY(-2px);
        }
        .input-group label {
            position: absolute; top: 50%; left: 15px; transform: translateY(-50%);
            color: #aaa; font-size: 1rem; pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .input-group input:focus ~ label, .input-group input:valid ~ label {
            top: -12px; left: 10px; font-size: 0.8rem; color: var(--primary);
            background: var(--dark); padding: 2px 8px; border-radius: 5px; font-weight: 600; letter-spacing: 1px;
        }

        /* --- Touch Pills (Role Selection) --- */
        .role-wrapper { margin-bottom: 25px; }
        .role-wrapper > p { color: #aaa; font-size: 0.9rem; margin-bottom: 12px; margin-left: 5px; }
        .role-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .role-option input[type="radio"] { display: none; }
        .role-option label {
            display: inline-block; padding: 10px 20px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; color: #ccc;
            font-size: 0.9rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); user-select: none;
        }
        .role-option label:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        .role-option input[type="radio"]:checked + label {
            background: linear-gradient(45deg, var(--primary), #ff5722); border-color: var(--primary);
            color: white; font-weight: 600; box-shadow: 0 8px 20px rgba(255, 122, 110, 0.4); transform: scale(1.05) translateY(-2px);
        }

        /* --- Checkbox --- */
        .checkbox-group { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 30px; font-size: 0.85rem; color: #ccc; line-height: 1.4; }
        .checkbox-group input { margin-top: 3px; accent-color: var(--primary); cursor: pointer; width: 18px; height: 18px; }

        /* --- Submit Button --- */
        button {
            width: 100%; padding: 16px; background: linear-gradient(45deg, #FF7A6E, #ff5722);
            border: none; border-radius: 12px; color: white; font-size: 1.2rem; font-weight: 800;
            letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 8px 25px rgba(255, 122, 110, 0.4);
            position: relative; overflow: hidden; text-transform: uppercase;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 122, 110, 0.6); }
        button:active { transform: translateY(1px); }

        .loader {
            display: none; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white;
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) { .form-wrapper { padding: 30px 20px; } .role-option label { padding: 8px 15px; font-size: 0.85rem; } }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div id="splash-screen">
        <div class="splash-logo">AayoApp</div>
        <div class="splash-tagline">Building India's Future Networking Ecosystem</div>
    </div>

    <div class="form-wrapper" id="main-form">
        <div class="form-header">
            <h2>Reserve Your Seat</h2>
            <p>Your Network Will Decide Your Success.</p>
        </div>

        <form id="webinar-form">
            <!-- Web3Forms Access Key -->
            <input type="hidden" name="access_key" value="YOUR_WEB3FORMS_ACCESS_KEY_HERE">
            <input type="hidden" name="subject" value="New AayoApp Webinar Registration!">

            <div class="input-group">
                <input type="text" id="full_name" name="full_name" required>
                <label for="full_name">Full Name</label>
            </div>

            <div class="input-group">
                <input type="email" id="email" name="email" required>
                <label for="email">Email Address</label>
            </div>

            <div class="input-group">
                <input type="tel" id="whatsapp" name="whatsapp" required>
                <label for="whatsapp">WhatsApp Number</label>
            </div>

            <div class="role-wrapper">
                <p>I identify as a:</p>
                <div class="role-grid">
                    <div class="role-option"><input type="radio" id="role_student" name="role" value="Student" required><label for="role_student">Student</label></div>
                    <div class="role-option"><input type="radio" id="role_creator" name="role" value="Creator" required><label for="role_creator">Creator</label></div>
                    <div class="role-option"><input type="radio" id="role_entrepreneur" name="role" value="Entrepreneur" required><label for="role_entrepreneur">Entrepreneur</label></div>
                    <div class="role-option"><input type="radio" id="role_freelancer" name="role" value="Freelancer" required><label for="role_freelancer">Freelancer</label></div>
                    <div class="role-option"><input type="radio" id="role_pro" name="role" value="Professional" required><label for="role_pro">Professional</label></div>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="social_id" name="social_id" required>
                <label for="social_id">Primary Social ID (IG/LinkedIn/X)</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I accept all terms and conditions and I confirm I will attend the live event to unlock exclusive AayoApp swag.</label>
            </div>

            <button type="submit" id="submit-btn">
                <span id="btn-text">Reserve My Seat</span>
                <div class="loader" id="btn-loader"></div>
            </button>
        </form>
    </div>

    <script>
        // --- 1. SPLASH SCREEN ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const formWrapper = document.getElementById('main-form');
                splash.style.opacity = '0'; splash.style.visibility = 'hidden';
                setTimeout(() => { formWrapper.classList.add('visible'); }, 300);
            }, 2500); 
        });

        // --- 2. FORM SUBMISSION (Using Web3Forms via AJAX for seamless UX) ---
        document.getElementById('webinar-form').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const submitBtn = document.getElementById('submit-btn');
            const form = event.target;

            // UI Loading state
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.8';

            // Gather form data
            const formData = new FormData(form);

            // ==============================================================
            // OPTION A: WEB3FORMS APPROACH (Active Below)
            // ==============================================================
            fetch("https://api.web3forms.com/submit", {
                method: "POST",
                body: formData
            })
            .then(async (response) => {
                let json = await response.json();
                if (response.status == 200) {
                    // Success UI
                    btnLoader.style.display = 'none';
                    btnText.style.display = 'block';
                    btnText.innerText = 'Seat Reserved! 🎉';
                    submitBtn.style.background = '#00c853'; 
                    submitBtn.style.boxShadow = '0 8px 25px rgba(0, 200, 83, 0.4)';
                    
                    setTimeout(() => {
                        form.reset();
                        btnText.innerText = 'Reserve My Seat';
                        submitBtn.style.background = ''; submitBtn.style.boxShadow = '';
                        submitBtn.style.opacity = '1'; submitBtn.disabled = false;
                    }, 4000);
                } else {
                    console.log(response);
                    alert("Something went wrong. Please try again.");
                    resetBtn(btnText, btnLoader, submitBtn);
                }
            })
            .catch(error => {
                console.log(error);
                alert("Something went wrong. Please try again.");
                resetBtn(btnText, btnLoader, submitBtn);
            });

            // ==============================================================
            // OPTION B: EMAILJS APPROACH (Commented Out)
            // If you prefer EmailJS, delete the 'fetch' block above, 
            // uncomment the lines below, and add your keys.
            // ==============================================================
            /*
            emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                .then(() => {
                    // Success UI (same as above)
                    btnLoader.style.display = 'none'; btnText.style.display = 'block';
                    btnText.innerText = 'Seat Reserved! 🎉'; submitBtn.style.background = '#00c853';
                    setTimeout(() => {
                        form.reset(); btnText.innerText = 'Reserve My Seat';
                        submitBtn.style.background = ''; submitBtn.disabled = false;
                    }, 4000);
                }, (error) => {
                    alert('Error: ' + JSON.stringify(error));
                    resetBtn(btnText, btnLoader, submitBtn);
                });
            */
        });

        function resetBtn(btnText, btnLoader, submitBtn) {
            btnLoader.style.display = 'none'; btnText.style.display = 'block';
            submitBtn.disabled = false; submitBtn.style.opacity = '1';
        }

        // --- 3. 3D PARTICLE NETWORK BACKGROUND ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; init();
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) { this.directionX = -this.directionX; }
                if (this.y > canvas.height || this.y < 0) { this.directionY = -this.directionY; }
                this.x += this.directionX; this.y += this.directionY; this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 8000; 
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1; let directionY = (Math.random() * 2) - 1;
                let color = Math.random() > 0.5 ? 'rgba(255, 122, 110, 0.9)' : 'rgba(255, 165, 0, 0.7)';
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate); ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); }
            connect();
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(255, 122, 110,' + opacityValue + ')';
                        ctx.lineWidth = 1.5; ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                    }
                }
            }
        }

        init(); animate();
    </script>
</body>
</html>
